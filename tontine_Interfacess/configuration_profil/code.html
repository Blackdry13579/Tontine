<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c9a326",
                        "background-light": "#F5F0E1",
                        "background-dark": "#201d12",
                        "luxe-cream": "#F5F0E1",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'gold-soft': '0 10px 25px -5px rgba(201, 163, 38, 0.12), 0 8px 10px -6px rgba(201, 163, 38, 0.08)',
                    }
                },
            },
        }
    </script>
<title>Aurum - Profil</title>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .form-input:focus {
            border-color: #c9a326 !important;
            ring-color: #c9a326 !important;
        }
        /* Custom radio styling for gender selection */
        .gender-option:checked + label {
            background-color: #c9a326;
            color: white;
            border-color: #c9a326;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative mx-auto max-w-[480px] min-h-screen flex flex-col bg-background-light dark:bg-background-dark pb-10">
<!-- Header -->
<header class="pt-8 px-6">
<button class="size-12 flex items-center justify-center rounded-full bg-white dark:bg-neutral-800 shadow-sm border border-primary/10 mb-6 text-neutral-800 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-[#2D2A26] dark:text-white text-3xl font-bold leading-tight tracking-tight">
                Compléter votre profil
            </h1>
<p class="text-neutral-500 dark:text-neutral-400 text-lg mt-2">
                Parlez-nous un peu de vous
            </p>
</header>
<!-- Form Content -->
<main class="flex-1 px-6 mt-8 space-y-6">
<!-- Nom Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-neutral-700 dark:text-neutral-300 ml-2">Nom</label>
<div class="bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/5 p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-neutral-800 dark:text-white placeholder:text-neutral-400 font-medium" placeholder="Ex: Traoré" type="text"/>
</div>
</div>
<!-- Prénom Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-neutral-700 dark:text-neutral-300 ml-2">Prénom</label>
<div class="bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/5 p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-neutral-800 dark:text-white placeholder:text-neutral-400 font-medium" placeholder="Ex: Moussa" type="text"/>
</div>
</div>
<!-- Pays Dropdown -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-neutral-700 dark:text-neutral-300 ml-2">Pays</label>
<div class="relative bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/5 p-1 flex items-center">
<div class="pl-6 flex items-center shrink-0">
<div class="w-6 h-4 bg-orange-500 rounded-sm relative overflow-hidden" data-alt="Drapeau de la Côte d'Ivoire">
<div class="absolute left-1/3 top-0 bottom-0 w-1/3 bg-white"></div>
<div class="absolute right-0 top-0 bottom-0 w-1/3 bg-green-600"></div>
</div>
</div>
<select class="w-full bg-transparent border-none focus:ring-0 px-3 py-4 text-neutral-800 dark:text-white font-medium appearance-none cursor-pointer">
<option selected="" value="CI">Côte d'Ivoire (+225)</option>
<option value="SN">Sénégal (+221)</option>
<option value="ML">Mali (+223)</option>
</select>
<span class="material-symbols-outlined absolute right-6 text-primary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Sexe Selection -->
<div class="space-y-3 pt-2">
<label class="block text-sm font-semibold text-neutral-700 dark:text-neutral-300 ml-2">Sexe</label>
<div class="flex gap-2 p-1.5 bg-white/50 dark:bg-neutral-900/50 rounded-full border border-primary/10 shadow-sm">
<div class="flex-1">
<input checked="" class="hidden gender-option" id="homme" name="gender" type="radio"/>
<label class="flex items-center justify-center py-3 px-4 rounded-full text-sm font-semibold transition-all cursor-pointer border border-transparent text-neutral-600 dark:text-neutral-400 hover:bg-white dark:hover:bg-neutral-800" for="homme">
                            Homme
                        </label>
</div>
<div class="flex-1">
<input class="hidden gender-option" id="femme" name="gender" type="radio"/>
<label class="flex items-center justify-center py-3 px-4 rounded-full text-sm font-semibold transition-all cursor-pointer border border-transparent text-neutral-600 dark:text-neutral-400 hover:bg-white dark:hover:bg-neutral-800" for="femme">
                            Femme
                        </label>
</div>
<div class="flex-1">
<input class="hidden gender-option" id="autre" name="gender" type="radio"/>
<label class="flex items-center justify-center py-3 px-4 rounded-full text-sm font-semibold transition-all cursor-pointer border border-transparent text-neutral-600 dark:text-neutral-400 hover:bg-white dark:hover:bg-neutral-800" for="autre">
                            Autre
                        </label>
</div>
</div>
</div>
</main>
<!-- Footer CTA -->
<footer class="mt-auto px-6 py-8">
<button class="w-full py-5 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-full shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Continuer
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="mt-6 flex justify-center gap-1.5">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
</div>
</footer>
</div>
</body></html>
