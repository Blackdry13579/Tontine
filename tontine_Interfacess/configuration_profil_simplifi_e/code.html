<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C9A227",
                        "emerald": "#0B3D2E",
                        "background-light": "#F5F0E1",
                        "background-dark": "#1a1812",
                        "luxe-cream": "#F5F0E1",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'gold-soft': '0 10px 25px -5px rgba(201, 162, 39, 0.12)',
                    }
                },
            },
        }
    </script>
<title>Aurum - Profil</title>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .form-input:focus {
            border-color: #c9a326 !important;
            ring-color: #c9a326 !important;
        }
        /* Custom radio styling for gender selection */
        .gender-option:checked + label {
            background-color: #c9a326;
            color: white;
            border-color: #c9a326;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative mx-auto max-w-[480px] min-h-screen flex flex-col bg-background-light dark:bg-background-dark pb-10">
<!-- Header -->
<header class="pt-8 px-6">
<button class="size-12 flex items-center justify-center rounded-full bg-white dark:bg-neutral-800 shadow-sm border border-primary/10 mb-6 text-neutral-800 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-emerald dark:text-white text-3xl font-bold leading-tight tracking-tight">
                Compléter votre profil
            </h1>
<p class="text-neutral-500 dark:text-neutral-400 text-lg mt-2">
                Parlez-nous un peu de vous
            </p>
</header>
<!-- Form Content -->
<main class="flex-1 px-6 mt-8 space-y-6"><!-- Profile Picture Upload -->
<div class="flex flex-col items-center mb-8">
<div class="relative">
<div class="size-28 rounded-full border-4 border-primary/20 bg-emerald/10 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-emerald/30">person</span>
</div>
<button class="absolute bottom-0 right-0 size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg border-2 border-background-light">
<span class="material-symbols-outlined text-xl">photo_camera</span>
</button>
</div>
<p class="text-xs font-semibold text-emerald mt-3 uppercase tracking-wider">Photo de profil</p>
</div>
<!-- Nom Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-emerald dark:text-neutral-300 ml-2">Nom</label>
<div class="bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/5 p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-neutral-800 dark:text-white placeholder:text-neutral-400 font-medium" placeholder="Ex: Traoré" type="text"/>
</div>
</div>
<!-- Prénom Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-emerald dark:text-neutral-300 ml-2">Prénom</label>
<div class="bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/5 p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-neutral-800 dark:text-white placeholder:text-neutral-400 font-medium" placeholder="Ex: Moussa" type="text"/>
</div>
</div><!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-emerald dark:text-neutral-300 ml-2">Mot de passe</label>
<div class="relative bg-white dark:bg-neutral-800 rounded-full shadow-gold-soft border border-primary/10 p-1 flex items-center">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-neutral-800 dark:text-white placeholder:text-neutral-400 font-medium" placeholder="••••••••" type="password"/>
<button class="absolute right-6 text-emerald/60">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Security PIN Section -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-emerald dark:text-neutral-300 ml-2">Code PIN de sécurité (6 chiffres)</label>
<div class="bg-emerald/5 dark:bg-emerald/10 rounded-2xl p-4 border border-emerald/10">
<div class="flex items-center justify-between mb-4">
<div class="flex gap-1">
<div class="size-2 rounded-full bg-emerald/20"></div>
<div class="size-2 rounded-full bg-emerald/20"></div>
<div class="size-2 rounded-full bg-emerald/20"></div>
<div class="size-2 rounded-full bg-emerald/20"></div>
<div class="size-2 rounded-full bg-emerald/20"></div>
<div class="size-2 rounded-full bg-emerald/20"></div>
</div>
<span class="text-xs font-bold text-emerald/60 uppercase">Non défini</span>
</div>
<div class="flex gap-2">
<button class="flex-1 py-2 bg-emerald text-white text-xs font-bold rounded-lg hover:bg-emerald/90 transition-colors">Définir</button>
<button class="flex-1 py-2 bg-white border border-emerald/20 text-emerald text-xs font-bold rounded-lg">Modifier</button>
<button class="px-3 py-2 text-red-600">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
</div>
<!-- Pays Dropdown -->
<!-- Sexe Selection -->
</main>
<!-- Footer CTA -->
<footer class="mt-auto px-6 py-8">
<button class="w-full py-5 bg-emerald hover:bg-emerald/95 text-white font-bold text-lg rounded-full shadow-xl shadow-emerald/10 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Continuer
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="mt-6 flex justify-center gap-1.5">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
</div>
</footer>
</div>
</body></html>
