<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c9a326",
                        "emerald-luxe": "#0B3D2E",
                        "background-light": "#F5F0E1",
                        "background-dark": "#201d12",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header Section -->
<header class="flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10 p-4 justify-between border-b border-primary/10">
<div class="text-emerald-luxe dark:text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-emerald-luxe dark:text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">Modifier profil</h1>
</header>
<!-- Profile Picture Section -->
<div class="flex p-8 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="relative group">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 ring-4 ring-primary/30 shadow-xl" data-alt="Portrait photo of a professional man for profile" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA7KII1-p35CWoxFwOvGlAFS8t8NjyNJZRJ4EG3vps5LcZ-PDKXVf73-uoR0xumqIpB1Y3JziYJVWZFHGPNh6A84sQitL8EGlxgVrtOGSW9ep7CsoYkEBx1LBuHyULGm5XTKj6UUSEi_DjShqoCQgR1T8cSuumli6dkNBjg11k4PIM7DNoBBj8h86f-FeDDanBOsFEvpKDo8ELnz8j-C7wTZrkQSgKf_12uAbiSeY4kZYqeTz6yyEXE0M33mleGtCrifrJFcCYcmWA");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-background-light flex items-center justify-center cursor-pointer hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</div>
</div>
<p class="text-emerald-luxe/70 dark:text-primary/70 text-sm font-medium">Changer la photo de profil</p>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5 px-6 pb-24">
<!-- First Name Field -->
<!-- Last Name Field -->
<div class="flex flex-col gap-2">
<label class="text-emerald-luxe dark:text-slate-300 text-sm font-semibold px-1">Nom</label>
<div class="flex w-full items-stretch bg-white dark:bg-background-dark/50 shadow-sm border border-emerald-luxe/10 focus-within:border-primary transition-all rounded-[12px]">
<div class="text-primary flex items-center justify-center pl-4 pr-2" style="color: #c9a326;">
<span class="material-symbols-outlined">id_card</span>
</div>
<input class="flex w-full min-w-0 flex-1 bg-transparent border-none focus:ring-0 text-emerald-luxe dark:text-slate-100 h-14 placeholder:text-emerald-luxe/40 text-base font-normal leading-normal" placeholder="Votre nom" type="text" value="Diallo"/>
</div>
</div><div class="flex flex-col gap-2">
<label class="text-emerald-luxe dark:text-slate-300 text-sm font-semibold px-1">Prénom</label>
<div class="flex w-full items-stretch bg-white dark:bg-background-dark/50 shadow-sm border border-emerald-luxe/10 focus-within:border-primary transition-all rounded-[12px]">
<div class="text-emerald-luxe dark:text-primary flex items-center justify-center pl-4 pr-2 text-primary" style="color: #60a5fa;">
<span class="material-symbols-outlined">person</span>
</div>
<input class="flex w-full min-w-0 flex-1 bg-transparent border-none focus:ring-0 text-emerald-luxe dark:text-slate-100 h-14 placeholder:text-emerald-luxe/40 text-base font-normal leading-normal" placeholder="Votre prénom" type="text" value="Amadou"/>
</div>
</div>
<!-- Last Name Field -->
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-emerald-luxe dark:text-slate-300 text-sm font-semibold px-1">Email (optionnel)</label>
<div class="flex w-full items-stretch bg-white dark:bg-background-dark/50 shadow-sm border border-emerald-luxe/10 focus-within:border-primary transition-all rounded-[12px]">
<div class="text-emerald-luxe dark:text-primary flex items-center justify-center pl-4 pr-2 text-primary" style="color: #94a3b8;">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="flex w-full min-w-0 flex-1 bg-transparent border-none focus:ring-0 text-emerald-luxe dark:text-slate-100 h-14 placeholder:text-emerald-luxe/40 text-base font-normal leading-normal" placeholder="votre@email.com" type="email" value="amadou.diallo@aurum.com"/>
</div>
</div>
<!-- Phone Field -->
<div class="flex flex-col gap-2">
<label class="text-emerald-luxe dark:text-slate-300 text-sm font-semibold px-1">Numéro de téléphone</label>
<div class="flex w-full items-stretch bg-white dark:bg-background-dark/50 shadow-sm border border-emerald-luxe/10 focus-within:border-primary transition-all rounded-[12px]">
<div class="text-emerald-luxe dark:text-primary flex items-center justify-center pl-4 pr-2 text-primary" style="color: #22c55e;">
<span class="material-symbols-outlined">call</span>
</div>
<input class="flex w-full min-w-0 flex-1 bg-transparent border-none focus:ring-0 text-emerald-luxe dark:text-slate-100 h-14 placeholder:text-emerald-luxe/40 text-base font-normal leading-normal" placeholder="+221 ..." type="tel" value="+221 77 123 45 67"/>
</div>
</div><div class="flex flex-col gap-2">
<label class="text-emerald-luxe dark:text-slate-300 text-sm font-semibold px-1">Mot de passe</label>
<div class="flex w-full items-stretch bg-white dark:bg-background-dark/50 shadow-sm border border-emerald-luxe/10 focus-within:border-primary transition-all rounded-[12px]">
<div class="flex items-center justify-center pl-4 pr-2 text-primary" style="">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="flex w-full min-w-0 flex-1 bg-transparent border-none focus:ring-0 text-emerald-luxe dark:text-slate-100 h-14 placeholder:text-emerald-luxe/40 text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
<div class="flex items-center justify-center pr-4 pl-2 text-emerald-luxe/40 dark:text-primary/40 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</div></div>
</div>
</div>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark">
<button class="w-full text-white font-bold py-4 shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 rounded-[12px] bg-emerald-luxe hover:bg-emerald-luxe/90" style="background-color: #0B3D2E;">
<span>Enregistrer les modifications</span>
<span class="material-symbols-outlined text-sm">check_circle</span>
</button>
</div>
<div class="h-10"></div>
</div>
</body></html>
